<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Turmas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>🏫 Cadastro de Turmas</h1>
    </header>

    <!-- NAV -->
    <nav class="main-nav">
        <a href="index.html">Início</a>
        <a href="turmas.html">Turmas</a>
        <a href="professores_cargas.html">Professores</a>
        <a href="grade.html">Grade</a>
    </nav>

    <!-- MAIN -->
    <main class="container">

        <!-- FORMULÁRIO -->
        <section class="card">
            <h2>Adicionar Turma</h2>

            <form id="turmaForm">
                <label for="nomeTurma">Nome da turma:</label>
                <input 
                    type="text" 
                    id="nomeTurma" 
                    placeholder="Ex: 6º Ano A"
                    required
                >

                <div class="btn-group">
                    <button type="submit">Adicionar</button>
                    <button type="reset">Limpar</button>
                </div>
            </form>
        </section>

        <!-- LISTA -->
        <section class="card">
            <h2>Turmas cadastradas</h2>
            <ul id="turmasList"></ul>
        </section>

        <!-- AÇÃO FINAL -->
        <section class="card">
            <h2>Finalizar</h2>
            <p>Após cadastrar todas as turmas, prossiga para a próxima etapa.</p>

            <div class="btn-group">
                <button id="concluirTurmasBtn">
                    Concluir cadastro
                </button>
            </div>
        </section>

    </main>

    <script src="js/turmas.js"></script>
</body>
</html>
