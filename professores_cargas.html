<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professores e Cargas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <h1>👨‍🏫 Professores e Cargas Horárias</h1>
    </header>

    <!-- NAV -->
    <nav class="main-nav">
        <a href="index.html">Início</a>
        <a href="turmas.html">Turmas</a>
        <a href="professores_cargas.html">Professores</a>
        <a href="grade.html">Grade</a>
    </nav>

    <!-- MAIN -->
    <main class="container">

        <!-- PROFESSORES -->
        <section class="card">
            <h2>Cadastro de Professores</h2>

            <form id="professorForm">

                <label for="nomeProfessor">Nome:</label>
                <input 
                    type="text" 
                    id="nomeProfessor" 
                    placeholder="Ex: João da Silva"
                    required
                >

                <label for="disciplinas">Disciplinas:</label>
                <input 
                    type="text" 
                    id="disciplinas"
                    placeholder="Ex: Matemática, Física"
                    required
                >

                <fieldset>
                    <legend>Disponibilidade</legend>
                    <label><input type="checkbox" name="disponibilidade" value="Segunda"> Segunda</label>
                    <label><input type="checkbox" name="disponibilidade" value="Terça"> Terça</label>
                    <label><input type="checkbox" name="disponibilidade" value="Quarta"> Quarta</label>
                    <label><input type="checkbox" name="disponibilidade" value="Quinta"> Quinta</label>
                    <label><input type="checkbox" name="disponibilidade" value="Sexta"> Sexta</label>
                </fieldset>

                <fieldset>
                    <legend>Nível de Ensino</legend>
                    <label><input type="checkbox" name="nivel" value="Fundamental"> Fundamental</label>
                    <label><input type="checkbox" name="nivel" value="Medio"> Médio</label>
                    <label><input type="checkbox" name="nivel" value="Tecnico"> Técnico</label>
                </fieldset>

                <button type="submit">Adicionar Professor</button>
            </form>

            <h3>Professores cadastrados</h3>
            <ul id="professoresList"></ul>
        </section>

        <!-- CARGA HORÁRIA -->
        <section class="card">
            <h2>Cadastro de Carga Horária</h2>

            <form id="cargaHorariaForm">

                <label for="professorCargaSelect">Professor:</label>
                <select id="professorCargaSelect" required></select>

                <label for="turmaCargaSelect">Turma:</label>
                <select id="turmaCargaSelect" required></select>

                <label for="disciplinaCarga">Disciplina:</label>
                <input 
                    type="text" 
                    id="disciplinaCarga"
                    placeholder="Ex: Matemática"
                    required
                >

                <label for="aulasPorSemana">Aulas por semana:</label>
                <input type="number" id="aulasPorSemana" min="1" max="10" required>

                <label for="limiteAulas">Limite por dia:</label>
                <input type="number" id="limiteAulas" min="1" max="6" required>

                <label>
                    <input type="checkbox" id="aulasGeminadas">
                    Aulas geminadas
                </label>

                <button type="submit">Adicionar Carga</button>
            </form>

            <h3>Cargas cadastradas</h3>
            <ul id="cargasHorariasList"></ul>
        </section>

        <!-- FINALIZAR -->
        <section class="card">
            <h2>Finalizar</h2>
            <p>Após cadastrar tudo, prossiga para gerar a grade.</p>

            <div class="btn-group">
                <button id="concluirProfessoresBtn">
                    Concluir cadastro
                </button>
            </div>
        </section>

    </main>

    <script src="js/utils.js"></script>
    <script src="js/professores.js"></script>

</body>
</html>
