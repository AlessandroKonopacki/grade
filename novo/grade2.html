<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Grade Horária</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="main-nav">
    <a href="index.html">Página Inicial</a>
    <a href="turmas.html">Cadastro de Turmas</a>
    <a href="professores_cargas.html">Professores e Cargas</a>
    <a href="grade.html">Grade Horária</a>
</nav>

<div class="container">
    <h1>Gerar Grade Horária</h1>

    <!-- CONFIGURAÇÃO -->
    <div class="card">
        <h2>Parâmetros</h2>

        <label>Gerações:</label>
        <input type="number" id="numGeracoes" value="100">

        <label>População:</label>
        <input type="number" id="tamanhoPopulacao" value="50">

        <label>Taxa de Mutação:</label>
        <input type="number" id="taxaMutacao" step="0.01" value="0.1">
    </div>

    <!-- BOTÕES -->
    <div class="btn-group">
        <button id="gerarGradeIABtn">Gerar Grade</button>
        <button id="novaGradeBtn">Limpar</button>
    </div>

    <!-- PROGRESSO -->
    <div class="progress-bar-container" style="display:none;">
        <div class="progress-bar"></div>
        <span class="progress-text"></span>
    </div>

    <!-- RESULTADO -->
    <div id="gradeContainer"></div>

    <!-- SOBRAS -->
    <div class="card">
        <h2>Aulas não alocadas</h2>
        <ul id="aulasSobrantesList"></ul>
    </div>
</div>

<!-- JS -->
<script src="js/utils.js"></script>
<script src="js/grade.js"></script>

</body>
</html>
